# Psiphon EgressRegion country configuration
# ----------------------------------------------------------------------------
# This file is the single source of truth for the countries offered by the
# Psiphon-3X-UI panel. Because the Psiphon upstream occasionally adds or
# removes supported EgressRegions, this file is intentionally editable.
#
# Each entry maps a 2-letter ISO-3166 code used by Psiphon's `EgressRegion`
# field to a human-friendly display name and flag emoji shown in the wizard
# and dashboard. To extend the list, simply append a new entry with a unique
# `code`; no code changes are required.
#
# IMPORTANT (YAML gotcha): every `code` value is QUOTED. YAML 1.1 parsers
# interpret a few bare 2-letter codes (e.g. `NO`, `no`, `On`, `Yes`) as
# booleans, and others (`AT`, `IN`, `0X`) inconsistently. Quoting them all
# keeps the file's semantics stable across YAML parser versions.
# These codes are based on the regions supported in recent psiphon-tunnel-core
# releases; the exact count may drift over time. Display "N available" in the UI
# rather than a hard-coded number.
# ----------------------------------------------------------------------------

version: 1

# Default recommended ranges used by the wizard's "smart recommendation"
# feature. The user can override these.
defaults:
  socks_port_range:
    start: 10001
    end:   10032
  public_port_range:
    start: 30000
    end:   30031

