# Ruff config. The canonical copy lives at the repo root in pyproject.toml
# (under [tool.ruff] ); this file just mirrors it so tools that look for a
# standalone ruff.toml get the same settings. Keep the two in sync.
line-length = 100
target-version = "py310"
extend-exclude = ["venv", ".venv", "build", "dist", "panel/static"]

[lint]
select = ["E", "W", "F", "I", "B", "UP", "C4", "SIM"]
ignore = ["E501"]
