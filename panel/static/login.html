<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Psiphon-3X-UI — Sign in</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    body { display: flex; min-height: 100vh; align-items: center; justify-content: center;
           background: #f6f7f9; }
    .login-card { width: 100%; max-width: 26rem; padding: 2rem 2.25rem; background: #fff;
                  border-radius: 8px; box-shadow: 0 10px 28px rgba(0,0,0,.10); }
    .login-card h1 { font-size: 1.35rem; margin: 0 0 .25rem; }
    .login-card .sub { color: #777; margin-bottom: 1.5rem; font-size: .9rem; }
    .login-card button { width: 100%; margin-top: .25rem; }
    .login-card button[disabled] { opacity: .55; pointer-events: none; }
    .toast { position: fixed; bottom: 1rem; right: 1rem; padding: .65rem 1rem;
             background: #b2182b; color: #fff; border-radius: 4px; font-size: .9rem;
             z-index: 9; box-shadow: 0 6px 16px rgba(0,0,0,.35); max-width: 22rem; }
    .toast.warn { background: #c77d1a; }
    .toast.ok { background: #2a7d2f; }
    .branding { text-align: center; margin-bottom: 1rem; }
    .branding .badge { display: inline-block; background: #2a7d2f; color: #fff;
                       padding: .15rem .55rem; border-radius: 3px; font-size: .7rem;
                       font-weight: 700; letter-spacing: .04em; }
  </style>
</head>
<body>
  <main class="container" x-data="appLogin()" x-init="probeSession()" x-cloak>
    <article class="login-card">
      <div class="branding">
        <span class="badge">Psiphon-3X-UI</span>
      </div>
      <h1>Sign in</h1>
      <p class="sub">Enter the admin credentials printed at the end of the installer.</p>

      <!-- Inline error / status banner -->
      <template x-if="toast.text">
        <div class="toast" :class="toast.kind" x-text="toast.text"></div>
      </template>

      <form @submit.prevent="submit()" autocomplete="on">
        <label for="user">Username</label>
        <input id="user" name="user" type="text" autocomplete="username"
               x-model="form.user" required autofocus
               :disabled="busy" placeholder="admin">

        <label for="password" style="margin-top:.75rem">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password"
               x-model="form.password" required
               :disabled="busy" placeholder="••••••••••">

        <button type="submit" :disabled="busy" :aria-busy="busy">
          <span x-show="!busy">Sign in</span>
          <span x-show="busy">Signing in…</span>
        </button>
      </form>
    </article>
  </main>

  <!-- Alpine.js (same CDN as the management dashboard for cache reuse) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    function appLogin() {
      return {
        form: { user: "", password: "" },
        busy: false,
        toast: { text: "", kind: "err" },

        /** If a valid session cookie is already present, jump straight to the
          * app the operator belongs on: ``/wizard`` before the first-run
          * setup is done, ``/dashboard`` afterward (see
          * ``panel.dashboard.router._require_wizard_completed`` for the 409
          * gate). */
        async probeSession() {
          try {
            const r = await fetch("/api/me", { credentials: "same-origin" });
            if (!r.ok) return;
            const body = await r.json();
            const target = body.wizard_completed ? "/dashboard" : "/wizard";
            window.location.replace(target);
          } catch (_) { /* no-op — show the login form */ }
        },

        /** Common post-login redirector: probe ``GET /api/me`` and dispatch
          * to ``/wizard`` or ``/dashboard`` based on ``wizard_completed``.
          * Falls back to ``/dashboard`` if the probe fails (the wizard
          * itself 409-redirects an authenticated user back to ``/wizard``
          * when needed, so even a wrong guess auto-corrects on arrival). */
        async _redirectAfterLogin(okBanner) {
          if (okBanner) this.banner(okBanner, "ok");
          try {
            const r = await fetch("/api/me", { credentials: "same-origin" });
            if (r.ok) {
              const body = await r.json();
              window.location.replace(body.wizard_completed ? "/dashboard" : "/wizard");
              return;
            }
          } catch (_) { /* fall through */ }
          window.location.replace("/dashboard");
        },

        /** Show a transient banner; auto-clears after a few seconds. */
        banner(message, kind) {
          this.toast = { text: message, kind: kind || "err" };
          if (kind === "ok") { setTimeout(() => { this.toast.text = ""; }, 1500); }
          else               { setTimeout(() => { this.toast.text = ""; }, 6000); }
        },

        /** POST the credentials and redirect on 204. */
        async submit() {
          if (this.busy) return;
          this.busy = true;
          this.toast.text = "";
          try {
            const r = await fetch("/auth/login", {
              method: "POST",
              credentials: "same-origin",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ user: this.form.user.trim(),
                                     password: this.form.password })
            });
            if (r.status === 204) {
              await this._redirectAfterLogin("Signed in — redirecting…");
              return;
            }
            // Try to surface the FastAPI {"detail": "..."} message verbatim.
            let detail = "";
            try { detail = (await r.json()).detail || ""; } catch (_) { /* non-JSON body */ }
            if (!detail) {
              detail = ({
                "401": "invalid username or password",
                "429": "too many login attempts — wait a minute and try again",
                "503": "panel not initialised — run the installer first",
              }[String(r.status)]) || ("unexpected status " + r.status + " from /auth/login");
            }
            this.banner(detail, r.status === 429 ? "warn" : "err");
          } catch (e) {
            this.banner("network error — could not reach the panel. " +
                        "Check the URL/port/browser TLS exception.", "err");
          } finally {
            this.busy = false;
          }
        }
      };
    }
  </script>
</body>
</html>
