# Pytest config. The canonical copy lives at the repo root in pyproject.toml
# (under [tool.pytest.ini_options] ); this file mirrors it so tools that look
# for a standalone pytest.ini get the same settings. Keep the two in sync.
[pytest]
asyncio_mode = auto
testpaths = tests
addopts = -ra
# Allow respx/pytest-asyncio to function in strict-mode environments.
filterwarnings =
    ignore::DeprecationWarning
