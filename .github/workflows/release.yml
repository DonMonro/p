name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build panel wheel
        run: |
          python -m pip install --upgrade pip build
          (cd panel && python -m build --wheel --outdir dist)

      - name: Compute sha256 of wheel
        id: sha
        run: |
          cd panel/dist
          sha256sum *.whl | tee sha256.txt
          echo "sha256=$(cat sha256.txt)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            panel/dist/*.whl
            panel/dist/sha256.txt
          body: |
            ## Psiphon-3X-UI ${{ github.ref_name }}

            Install on an Ubuntu server with Sanaei 3x-ui already installed:

            ```bash
            bash <(curl -sL https://raw.githubusercontent.com/psiphon-3x-ui/psiphon-3x-ui/main/install.sh) \
              || bash <(wget -qO- https://raw.githubusercontent.com/psiphon-3x-ui/psiphon-3x-ui/main/install.sh)
            ```

            Wheel integrity: see `sha256.txt`.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
